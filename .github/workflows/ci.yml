name: CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  credit-risk-pipeline:

    runs-on: ubuntu-latest

    steps:

      # ==========================================================
      # Checkout do repositório
      # ==========================================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==========================================================
      # Setup Python
      # ==========================================================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ==========================================================
      # Cache de dependências
      # ==========================================================
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ==========================================================
      # Instalar dependências
      # ==========================================================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ==========================================================
      # Instalar DVC
      # ==========================================================
      - name: Install DVC
        run: |
          pip install dvc

      # ==========================================================
      # Validar estrutura do projeto
      # ==========================================================
      - name: Validate imports
        run: |
          python -m src.ingestion.load_data --help || true
          python -m src.processing.cleaning --help || true
          python -m src.processing.feature_engineering --help || true

      # ==========================================================
      # Executar pipeline DVC
      # ==========================================================
      - name: Run DVC pipeline
        run: |
          dvc repro

      # ==========================================================
      # Rodar treinamento benchmark
      # ==========================================================
      - name: Run training pipeline
        run: |
          python -m src.modeling.train

      # ==========================================================
      # Rodar explainability SHAP
      # ==========================================================
      - name: Run SHAP explainability
        run: |
          python -m src.explainability.explain

      # ==========================================================
      # Rodar monitoramento de drift
      # ==========================================================
      - name: Run drift monitoring
        run: |
          python -m src.monitoring.drift

      # ==========================================================
      # Rodar validação de qualidade
      # ==========================================================
      - name: Run data validation
        run: |
          python -m src.validation.validator

      # ==========================================================
      # Upload de artefatos
      # ==========================================================
      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: reports/

      # ==========================================================
      # Upload modelos
      # ==========================================================
      - name: Upload trained models
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: models/