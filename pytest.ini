# ---------------------------------------------------------------------------
# Test discovery
# ---------------------------------------------------------------------------
[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py


# ---------------------------------------------------------------------------
# Output
# ---------------------------------------------------------------------------
addopts =
    -v
    -q
    --strict-markers
    --tb=short
    --import-mode=importlib

# ---------------------------------------------------------------------------
# Custom markers
# Registered here to avoid PytestUnknownMarkWarning with --strict-markers
# ---------------------------------------------------------------------------
markers =
    unit: Fast, isolated unit tests with no external dependencies
    integration: Tests that touch the file system, MLflow, or real data
    api: Tests for the FastAPI inference service
    slow: Tests that take >5 seconds (excluded from pre-commit hooks)
    smoke: Minimal sanity checks run as part of CI smoke step

# ---------------------------------------------------------------------------
# Logging capture
# ---------------------------------------------------------------------------
log_cli = false
log_level = WARNING

# ---------------------------------------------------------------------------
# Import mode
# importlib avoids sys.path manipulation and is safer for packages
# ---------------------------------------------------------------------------